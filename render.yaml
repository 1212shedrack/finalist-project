services:
  - type: web
    name: amaranthus-ai
    env: python
    region: oregon           # Free tier region
    plan: free

    # ── Build ──────────────────────────────────────────────────────────────────
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --no-input
      python manage.py migrate --run-syncdb

    # ── Start ──────────────────────────────────────────────────────────────────
    startCommand: gunicorn amaranthus_project.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120

    # ── Environment Variables ──────────────────────────────────────────────────
    envVars:
      - key: SECRET_KEY
        generateValue: true          # Render auto-generates a secure random key

      - key: DEBUG
        value: "False"

      - key: PYTHON_VERSION
        value: "3.12.3"

      - key: TF_ENABLE_ONEDNN_OPTS
        value: "0"

      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: amaranthus-ai
          property: host
